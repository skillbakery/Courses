name: AI Career Coach

on:
push:
branches:
  - main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: Install Dependencies
    working-directory: 67-LangChain-OpenAI-React/Module-10
    run: npm install

  - name: Run Tests
    working-directory: 67-LangChain-OpenAI-React/Module-10
    run: node tests/careerCoach.test.js

  - name: Deploy
    run: echo "Deploying..."
